name: Schedule Probe

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger context
        run: |
          echo "event=${{ github.event_name }}"
          echo "run_id=${{ github.run_id }}"
          echo "sha=${{ github.sha }}"
          echo "utc_now=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
