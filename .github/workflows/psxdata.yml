name: Daily PSX Data Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 13:00 UTC = 18:00 PKT (UTC+5), Mon-Fri
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-psx
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install pdfplumber requests

      - name: Ensure output directory exists
        run: mkdir -p public/data/psx && touch public/data/psx/.gitkeep

      - name: Run PSX parser
        run: python src/scripts/parse_psx.py
        # Script exits with code 1 if nothing was fetched - job will be marked failed

      - name: Show generated files
        run: ls -lh public/data/psx/

      - name: Commit and push
        run: |
          git config user.name "PSX Bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/psx/
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: PSX closing data $(date +'%Y-%m-%d %H:%M PKT')"
            git push
          fi