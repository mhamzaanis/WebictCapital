name: Daily PSX Data Update

permissions:
  contents: read

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 17:00 PKT Mon-Fri (excludes Sat/Sun)
  workflow_dispatch:

concurrency:
  group: psx-data-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-psx
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install pdfplumber requests supabase postgrest

      - name: Validate required secrets
        run: |
          set -euo pipefail
          test -n "${SUPABASE_URL}"
          test -n "${SUPABASE_SERVICE_KEY}"

      - name: Run PSX parser with hourly retries
        run: |
          set -euo pipefail
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Attempt ${attempt}/${max_attempts}: running parser"
            if python src/scripts/parse_psx.py; then
              echo "Parser succeeded on attempt ${attempt}."
              exit 0
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Parser failed. Waiting 1 hour before retry..."
              sleep 3600
            fi
          done
          echo "Parser failed after ${max_attempts} attempts."
          exit 1